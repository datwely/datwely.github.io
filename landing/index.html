<!DOCTYPE html>
<html>

<head>
    <title>Very Wely Media</title>

    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/landing.css" />
</head>

<body>

<div class="scanlines"></div>

<header>
    <h1 class="glitch" data-text="VERY WELY MEDIA">
        VERY WELY MEDIA
    </h1>
</header>

<div class="something">

<section class="left-side">

<div class="slideshow-box">

<h3>Favorite Tracks</h3>

<a id="songLink" href="#" target="_blank">
<img id="slideImg" src="../assets/images/slides/TheSpaceWeCreated.jpg">
</a>

</div>

</section>

<section class="main">

<div class="hero-img">
<h1>HELLO</h1>
</div>

<p>Welcome to Wely</p>

</section>

<section class="sidebar">

<div class="clock-box">

<h3>Local Time</h3>
<p id="clock">loading...</p>

</div>

</section>

</div>

<footer>
<p>© 2026 Wesley Chu</p>
</footer>

<script>

function updateClock() {
const now = new Date();
document.getElementById("clock").innerText =
now.toLocaleString();
}

setInterval(updateClock,1000);

</script>

<script>

const slides = [

{
img:"../assets/images/slides/TheSpaceWeCreated.jpg",
link:"https://www.youtube.com/watch?v=_9JH_iPUZb0"
},

{
img:"../assets/images/slides/SublimeSanteria.jpg",
link:"https://www.youtube.com/watch?v=k3ZeUL4fRyk"
},

{
img:"../assets/images/slides/WatchMeFly.jpg",
link:"https://www.youtube.com/watch?v=Qq89_E-gchw"
}

];

let currentSlide = 0;

function changeSlide(){

currentSlide++;

if(currentSlide >= slides.length){
currentSlide = 0;
}

document.getElementById("slideImg").src = slides[currentSlide].img;
document.getElementById("songLink").href = slides[currentSlide].link;

}

setInterval(changeSlide,4000);

</script>

</body>
</html>
